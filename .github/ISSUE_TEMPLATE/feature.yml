name: Feature (Kanban)
description: Request a new feature, capability, or enhancement.
title: "[Feature]: "
type: Feature
projects: ["suu-itadm/11"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Fill out the sections below — the more context you
        provide, the faster this can be scoped and picked up. Only **Overview** is required.

  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: What is this feature and why do we need it? Describe the problem or opportunity.
      placeholder: |
        A short summary of the feature and the context/motivation behind it.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: What specifically needs to be built or changed? Use a checklist where it helps.
      placeholder: |
        - Requirement one
        - Requirement two
    validations:
      required: false

  - type: textarea
    id: outcomes
    attributes:
      label: Outcomes
      description: What does "done" look like? The observable result when this ships.
      placeholder: |
        - A user can do X
        - The system behaves like Y
    validations:
      required: false

  - type: textarea
    id: questions
    attributes:
      label: Open Questions
      description: Anything unresolved that needs a decision before or during this work.
      placeholder: |
        - How should we handle ...?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Screenshots, links, mockups, or any other supporting context.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Urgent
      default: 1
    validations:
      required: true

  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic
      description: If this belongs to an epic, link it here.
      placeholder: "Parent: #..."
    validations:
      required: false

  - type: input
    id: related
    attributes:
      label: Related issues
      placeholder: "Relates to #..."
    validations:
      required: false
