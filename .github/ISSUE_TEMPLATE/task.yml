name: Task (Kanban)
description: >-
  A discrete piece of work — often operational or outside the main code repos
  (queries, upgrades, one-offs) — that may or may not result in a PR.
title: "[Task]: "
type: Task
projects: ["suu-itadm/11"]
body:
  - type: markdown
    attributes:
      value: |
        Use a **Task** for well-scoped work that stands on its own — running a query for a
        stakeholder, a system upgrade, a config change, or other one-off work that doesn't
        map neatly to a code PR in one of our main repos.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done, and why?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details / context
      description: Any background, links, commands, or steps needed to do the work.
      placeholder: |
        - Stakeholder / requester:
        - Systems involved:
        - Relevant links or docs:
    validations:
      required: false

  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable / outcome
      description: What should exist when this is done? (a report, a query result, an upgraded system, etc.)
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria / Definition of Done
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Urgent
      default: 1
    validations:
      required: false

  - type: input
    id: parent-epic
    attributes:
      label: Parent Epic
      description: If this belongs to an epic, link it here.
      placeholder: "Parent: #..."
    validations:
      required: false

  - type: input
    id: related
    attributes:
      label: Related issues
      placeholder: "Relates to #..."
    validations:
      required: false
